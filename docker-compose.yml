services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ss_ticketera_front_local
    ports:
      - '4201:4200'
    environment:
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
    volumes:
      - .:/app
      - /app/node_modules
    restart: unless-stopped
