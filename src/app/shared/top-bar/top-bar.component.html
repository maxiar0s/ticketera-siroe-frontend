<div class="flex">
  <div class="title-group">
    <button
      *ngIf="showMenuToggle"
      type="button"
      class="menu-toggle-button"
      [attr.aria-expanded]="isMenuOpen"
      aria-label="Abrir o cerrar menú"
      (click)="onMenuToggle()"
    >
      <span></span>
      <span></span>
      <span></span>
    </button>
    <h1 class="title">{{ title() }}</h1>
  </div>
  <div class="flex-search">
    <div class="search-bar" #searchBar *ngIf="features.barraBusqueda">
      <label for="search" #searchLabel>
        <img src="/assets/svg/search.svg" alt="search" class="svg" />
      </label>
      <input
        type="text"
        class="search-bar-input"
        placeholder="Escribe para buscar..."
        name="search"
        id="search"
        #searchInput
      />
    </div>
    <button
      type="button"
      class="agent-button"
      [attr.aria-expanded]="agentPopupVisible"
      aria-label="Abrir chat del agente"
      (click)="toggleAgentChat()"
    >
      <span class="agent-button-icon">IA</span>
      <span class="agent-button-label">Agente</span>
    </button>
    <button
      *ngIf="features.notificaciones"
      type="button"
      class="notifications-button"
      (click)="toggleNotifications()"
      [attr.aria-label]="
        unreadCount > 0
          ? unreadCount + ' notificaciones sin leer'
          : 'Notificaciones'
      "
    >
      <img src="/assets/svg/notifications.svg" alt="notificaciones" />
      <span *ngIf="unreadCount > 0" class="notifications-badge">
        {{ unreadCount }}
      </span>
    </button>
    <div class="avatar-wrapper">
      <a [routerLink]="['/perfil']" routerLinkActive="router-link-active">
        <div
          class="user-avatar"
          [ngStyle]="{ 'background-color': avatarColor }"
        >
          {{ avatarIniciales }}
        </div>
      </a>
    </div>
  </div>
</div>
<div
  class="notifications-backdrop"
  *ngIf="popupVisible || agentPopupVisible"
  (click)="closeNotifications(); closeAgentChat()"
></div>
<div class="notifications-modal" *ngIf="popupVisible">
  <div class="notifications-header">
    <h3>Notificaciones</h3>
    <button
      type="button"
      class="close-button"
      aria-label="Cerrar"
      (click)="closeNotifications()"
    >
      ×
    </button>
  </div>
  <div class="notifications-body">
    <div *ngIf="loadingNotificaciones" class="notifications-loading">
      Cargando notificaciones...
    </div>
    <div
      *ngIf="!loadingNotificaciones && notificaciones.length === 0"
      class="notifications-empty"
    >
      No tienes notificaciones pendientes.
    </div>
    <ul
      *ngIf="!loadingNotificaciones && notificaciones.length > 0"
      class="notifications-list"
    >
      <li
        *ngFor="let notificacion of notificaciones"
        [class.no-leida]="!notificacion.leida"
      >
        <button type="button" (click)="onNotificationClick(notificacion)">
          <span class="titulo">{{ notificacion.titulo }}</span>
          <span class="detalle">{{
            obtenerDetalleNotificacion(notificacion)
          }}</span>
          <span class="fecha">{{
            notificacion.createdAt | date : "dd/MM/yyyy HH:mm"
          }}</span>
        </button>
      </li>
    </ul>
  </div>
  <div class="notifications-footer" *ngIf="unreadCount > 0">
    <button type="button" class="mark-all-button" (click)="markAllRead()">
      Marcar todas como leidas
    </button>
  </div>
</div>

<div class="agent-chat-modal" *ngIf="agentPopupVisible">
  <div class="agent-chat-header">
    <div class="agent-chat-title">
      <span class="agent-badge">IA</span>
      <div>
        <h3>Agente</h3>
        <p>Asistente con inteligencia artificial</p>
      </div>
    </div>
    <button
      type="button"
      class="close-button"
      aria-label="Cerrar chat"
      (click)="closeAgentChat()"
    >
      ×
    </button>
  </div>

  <div class="agent-chat-body">
    <div
      class="agent-chat-message"
      *ngFor="let message of chatMessages"
      [class.from-user]="message.role === 'user'"
    >
      <span>{{ message.text }}</span>
      <ul
        *ngIf="message.role === 'agent' && message.sources?.length"
        class="agent-chat-sources"
      >
        <li *ngFor="let source of message.sources">
          <button type="button" (click)="abrirFuente(source)">
            {{ source.label }}
          </button>
        </li>
      </ul>
      <div
        class="agent-chat-actions"
        *ngIf="mostrarAccionCrearTicket(message)"
      >
        <button
          type="button"
          class="primary-button small"
          (click)="abrirModalCrearTicket()"
        >
          Crear ticket
        </button>
      </div>
    </div>
    <div class="agent-chat-message" *ngIf="isSendingAgentMessage">
      Escribiendo respuesta...
    </div>
  </div>

  <form class="agent-chat-footer" (ngSubmit)="sendAgentMessage()">
    <input
      type="text"
      name="agent-chat"
      #agentChatInput
      placeholder="Escribe tu consulta..."
      [(ngModel)]="chatDraft"
      [disabled]="isSendingAgentMessage"
    />
    <button
      type="submit"
      class="primary-button small"
      [disabled]="isSendingAgentMessage || !chatDraft.trim()"
    >
      {{ isSendingAgentMessage ? 'Enviando...' : 'Enviar' }}
    </button>
  </form>
</div>
