<div class="opciones-section">
  <h1 class="opciones-title">Configuración y Opciones</h1>
  <div class="opciones-grid">
    <div class="opcion-card">
      <div class="opcion-icon">
        <img src="/assets/svg/settings.svg" alt="configuración" width="40" height="40" />
      </div>
      <div class="opcion-info">
        <h2>Preferencias generales</h2>
        <p>Personaliza el comportamiento general de la aplicación.</p>
        <button class="opcion-btn">Editar preferencias</button>
      </div>
    </div>
    <div class="opcion-card">
      <div class="opcion-icon">
        <img src="/assets/svg/user.svg" alt="usuarios" width="40" height="40" />
      </div>
      <div class="opcion-info">
        <h2>Gestión de usuarios</h2>
        <p>Administra los permisos y cuentas de los usuarios.</p>
        <button class="opcion-btn">Administrar usuarios</button>
      </div>
    </div>
    <div class="opcion-card">
      <div class="opcion-icon">
        <img src="/assets/svg/database.svg" alt="datos" width="40" height="40" />
      </div>
      <div class="opcion-info">
        <h2>Datos y respaldos</h2>
        <p>Gestiona copias de seguridad y restauración de datos.</p>
        <button class="opcion-btn">Ver opciones de respaldo</button>
      </div>
    </div>
  </div>
</div>
