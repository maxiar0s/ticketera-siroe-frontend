<div class="flex">
  <h2 class="title">Lista de usuarios</h2>
  <button class="option-button" (click)="abrirModal()">

    <img src="/assets/svg/agregar-equipo-hover.svg" class="svg" alt="agregar.svg">

    <span>Añadir usuario</span>
  </button>
</div>


<shared-crear-usuario class="size-modal"
*ngIf="isModalVisible"
(cerrarModal)="cerrarModal()"
(enviarFormulario)="crearUsuario($event)"
></shared-crear-usuario>
