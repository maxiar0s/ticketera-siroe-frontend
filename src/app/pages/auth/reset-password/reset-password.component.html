<div class="reset-page">
  <div class="reset-card">
    <h2>Restablecer contrasena</h2>

    <div *ngIf="resetSuccess" class="success-message">
      {{ resetSuccess }}
    </div>

    <div *ngIf="resetError" class="error-message">
      {{ resetError }}
    </div>

    <form [formGroup]="resetForm" (submit)="enviarNuevaContrasena()" class="reset-form">
      <div class="field">
        <label for="password">Nueva contrasena</label>
        <input id="password" type="password" formControlName="password" placeholder="Minimo 8 caracteres" />
        <div *ngIf="resetForm.get('password')?.invalid && resetForm.get('password')?.touched" class="error-inline">
          Debes ingresar una contrasena de al menos 8 caracteres.
        </div>
      </div>

      <div class="field">
        <label for="confirmPassword">Confirmar contrasena</label>
        <input id="confirmPassword" type="password" formControlName="confirmPassword" placeholder="Repite la nueva contrasena" />
        <div *ngIf="resetForm.get('confirmPassword')?.invalid && resetForm.get('confirmPassword')?.touched" class="error-inline">
          Debes confirmar la contrasena.
        </div>
      </div>

      <button *ngIf="!enviando" [disabled]="resetForm.invalid" type="submit" class="btn" [ngClass]="{ 'invalid-form': resetForm.invalid, 'valid-form': resetForm.valid }">
        Guardar nueva contrasena
      </button>
      <button *ngIf="enviando" type="button" class="btn">
        <div class="spinner-buttons spinner-size-buttons spinner-color"></div>
      </button>
    </form>

    <button type="button" class="btn-back" (click)="volverAlLogin()">Volver al login</button>
  </div>
</div>
