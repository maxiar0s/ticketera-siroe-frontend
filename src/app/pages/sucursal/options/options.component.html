<div class="options-flex">
  <h1 class="title">Listado de equipos</h1>
  <div class="flex-buttons" *ngIf="estado || !estado">
    <button class="inner-button imprimir">
      <img src="/assets/svg/impresora.svg" class="svg" alt="impresora_svg">
      <span>Imprimir etiqueta</span>
    </button>
    <button class="inner-button importar">
      <img src="/assets/svg/importar.svg" class="svg" alt="importar_svg">
      <span>Importar datos</span>
    </button>
    <button [disabled]="!estado" [ngClass]="{'agregar-equipo': estado, 'agregar-equipo-disabled': !estado}" (click)="abrirModal()" class="inner-button">
      <img [src]="estado ? '/assets/svg/agregar-equipo.svg' : '/assets/svg/agregar-equipo-disabled.svg' " class="svg" alt="agregar-equipo_svg">
      <span>Añadir equipos</span>
    </button>
  </div>
</div>

<shared-crear-equipo class="form-crear-cliente"
*ngIf="isModalVisible"
(cerrarModal)="cerrarModal()"
(enviarFormulario)="crearEquipos($event)"
></shared-crear-equipo>
