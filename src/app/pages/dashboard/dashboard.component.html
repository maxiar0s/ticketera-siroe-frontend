<div class="section">
  <!-- Filtro de técnicos para admin -->
  <div class="dashboard-filter" *ngIf="esAdmin && hasTicketWidgets()">
    <label class="filter-label">
      <span>Ver tickets de:</span>
      <select [(ngModel)]="filtroTecnicoId" (change)="onFiltroChange()">
        <option value="">Todos</option>
        <option [value]="usuarioActualId">Mis tickets</option>
        <option *ngFor="let tec of tecnicosDisponibles" [value]="tec.id">
          {{ tec.name }}
        </option>
      </select>
    </label>
  </div>

  <!-- Ticket Widgets -->
  <ng-container *ngIf="dashboardConfig.tickets.estadoCards">
    <app-ticket-status-cards [tickets]="tickets"></app-ticket-status-cards>
  </ng-container>

  <!-- Primera fila: 2 columnas (Tickets por Mes + Tiempo de Respuesta) -->
  <div class="ticket-charts-row-2" *ngIf="hasTicketWidgets()">
    <div class="chart-card" *ngIf="dashboardConfig.tickets.cantidadPorMes">
      <app-ticket-count-by-month
        [tickets]="tickets"
      ></app-ticket-count-by-month>
    </div>
    <div class="chart-card" *ngIf="dashboardConfig.tickets.tiempoRespuesta">
      <app-ticket-response-time [tickets]="tickets"></app-ticket-response-time>
    </div>
  </div>

  <!-- Segunda fila: 3 columnas (Fuente, Prioridad, Tipo) -->
  <div class="ticket-charts-row-3" *ngIf="hasTicketWidgets()">
    <div class="chart-card" *ngIf="dashboardConfig.tickets.porFuente">
      <app-ticket-by-source [tickets]="tickets"></app-ticket-by-source>
    </div>
    <div class="chart-card" *ngIf="dashboardConfig.tickets.porPrioridad">
      <app-ticket-by-priority [tickets]="tickets"></app-ticket-by-priority>
    </div>
    <div class="chart-card" *ngIf="dashboardConfig.tickets.porTipo">
      <app-ticket-by-type [tickets]="tickets"></app-ticket-by-type>
    </div>
  </div>

  <!-- Legacy/Other Widgets -->
  <dashboard-charts
    [option]="Option"
    *ngIf="
      dashboardConfig.calendar ||
      dashboardConfig.charts.equiposPorTipo ||
      dashboardConfig.charts.equiposPorCliente ||
      dashboardConfig.charts.visitasPorMes ||
      dashboardConfig.charts.visitasResumen
    "
  ></dashboard-charts>

  <ng-container *ngIf="dashboardConfig.summaryTable">
    <h2 class="title">Resumen</h2>
    <shared-options (optionSelected)="selectedOption($event)"></shared-options>
    <dashboard-summary [option]="Option"></dashboard-summary>
  </ng-container>

  <shared-navegation></shared-navegation>
</div>
