<div class="dashboard-section">
  <div class="summary-controls">
    <label>
      Datos columna 1
      <select [(ngModel)]="selectedVariant1" (ngModelChange)="setVariant('variante1', $event)">
        <option *ngFor="let option of variantOptions" [value]="option.value">
          {{ option.label }}
        </option>
      </select>
    </label>

    <label>
      Datos columna 2
      <select [(ngModel)]="selectedVariant2" (ngModelChange)="setVariant('variante2', $event)">
        <option *ngFor="let option of variantOptions" [value]="option.value">
          {{ option.label }}
        </option>
      </select>
    </label>
  </div>

  <table class="table">
    <thead>
      <tr class="table-row-style">
        <th>Cliente</th>
        <th>{{ getVariantLabel(selectedVariant1) }}</th>
        <th>{{ getVariantLabel(selectedVariant2) }}</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngIf="loading">
        <td colspan="3" style="text-align:center;">Cargando datos...</td>
      </tr>
      <tr *ngIf="!loading && clientes.length === 0">
        <td colspan="3" style="text-align:center;">No hay datos para mostrar.</td>
      </tr>
      <tr *ngFor="let cliente of clientes" class="table-row-style">
        <td>{{ cliente.razonSocial }}</td>
        <td>{{ getVariantValue(cliente, selectedVariant1) }}</td>
        <td>{{ getVariantValue(cliente, selectedVariant2) }}</td>
      </tr>
    </tbody>
  </table>
</div>
