<div class="grid-tables">
  <div class="calendar-card">
    <dashboard-calendar
      [bitacoras]="bitacoras"
      [cargando]="loadingBitacoras"
      [mensajeError]="bitacorasError"
      (refreshRequested)="onVisitaAgendada()"
    ></dashboard-calendar>
  </div>

  <div class="dashboard-card">
    <div class="card-header">
      <h3 class="card-title">Equipos por tipo</h3>
      <span class="card-status" *ngIf="loadingClientes">Cargando...</span>
    </div>

    <p class="card-error" *ngIf="!loadingClientes && clientesError">{{ clientesError }}</p>

    <ng-container *ngIf="!loadingClientes && !clientesError">
      <ng-container *ngIf="equiposPorTipoData.length; else sinEquiposPorTipo">
        <simple-bar-chart [data]="equiposPorTipoData"></simple-bar-chart>
      </ng-container>
    </ng-container>

    <ng-template #sinEquiposPorTipo>
      <p class="card-empty">No hay equipos registrados aun.</p>
    </ng-template>
  </div>

  <div class="dashboard-card">
    <div class="card-header">
      <h3 class="card-title">Equipos por cliente</h3>
      <span class="card-status" *ngIf="loadingClientes">Cargando...</span>
    </div>

    <p class="card-error" *ngIf="!loadingClientes && clientesError">{{ clientesError }}</p>

    <ng-container *ngIf="!loadingClientes && !clientesError">
      <ng-container *ngIf="equiposPorClienteData.length; else sinEquiposPorCliente">
        <simple-bar-chart [data]="equiposPorClienteData"></simple-bar-chart>
      </ng-container>
    </ng-container>

    <ng-template #sinEquiposPorCliente>
      <p class="card-empty">No hay clientes con equipos asociados.</p>
    </ng-template>
  </div>

  <div class="dashboard-card">
    <div class="card-header">
      <h3 class="card-title">Visitas registradas por mes</h3>
      <span class="card-status" *ngIf="loadingBitacoras">Cargando...</span>
    </div>

    <p class="card-error" *ngIf="!loadingBitacoras && bitacorasError">{{ bitacorasError }}</p>

    <ng-container *ngIf="!loadingBitacoras && !bitacorasError">
      <simple-bar-chart [data]="visitasPorMesData"></simple-bar-chart>
    </ng-container>
  </div>
</div>
