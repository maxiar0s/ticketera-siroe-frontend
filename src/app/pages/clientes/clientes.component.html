<div class="clients">
  <h1 class="title">Mostrar listado de clientes</h1>

  <div class="grid-clients">

    <div *ngFor="let item of [1, 2, 3, 4, 5, 6, 7, 8, 9]; let i = index" class="card-clients">
      <div class="card-header">
        <h1 class="card-title">Farmacias Simi</h1>
      </div>
      <div class="card-body">
        <div class="card-body-flex">
          <div class="card-body-photo"></div>
          <div class="card-body-information">
            <p>Razón social: <span>xxxx</span></p>
            <p>RUT: <span>xxxx</span></p>
            <p>Encargado General: <span>Juanito Perez</span></p>
            <p>Correo:</p>
            <p>Teléfono Encargado: <span>+569 6931 8322</span></p>
            <p>ID Cliente: <span>xxxx</span></p>
            <a [routerLink]="['/cliente']" routerLinkActive="router-link-active" class="card-body-button">Seleccionar cliente</a>
          </div>
        </div>
      </div>
    </div>

  </div>
</div>
