<div class="section client">
  <cliente-casa-matriz [cliente]="cliente" class="casa-matriz-container"></cliente-casa-matriz>
  <ng-container *ngIf="clienteTieneSoporte; else clienteSinSoporteTi">
    <cliente-header [cerrarCrear]="cerrarModal" [esAdministrador]="esAdministrador" [casaMatrizId]="casaMatrizId" (enviarFormulario)="crearModificarSucursal($event)"></cliente-header>
    <shared-options (optionSelected)="selectedOption($event)"></shared-options>

  @if(!sucursales){
    <div class="loader">
      <div class="spinner-section spinner-size-section"></div>
    </div>
  }
  @else {
    <cliente-sucursales (eliminarForm)="eliminarSucursal($event)" (sucursalForm)="crearModificarSucursal($event)" (indiceTabla)="modificarIndiceTable($event)" [esAdministrador]="esAdministrador" [setSucursales]="sucursales"></cliente-sucursales>
    <div class="navegation-section">
      <shared-navegation [paginaActual]="paginaActual"
      [paginas]="paginas"
      (cambiarPagina)="cambiarPagina($event)"></shared-navegation>
    </div>
  }
  </ng-container>

  <ng-template #clienteSinSoporteTi>
    <section class="client-empty-state">
      <h3>Cliente sin Soporte TI</h3>
      <p>
        Este cliente no usa el servicio de Soporte TI, por lo que no maneja
        sucursales ni equipos en este modulo.
      </p>
    </section>
  </ng-template>
</div>
