<section class="main-grid">
  <div>
    <div></div>
    <!-- <img src="" alt=""> -->
  </div>
  <div class="flex-column">
    <h1 *ngIf="!obtainedClient" class="temp-title casa-matriz">Cargando cliente...</h1>
    <h1 *ngIf="obtainedClient" class="casa-matriz">{{ cliente?.razonSocial }}</h1>
    <div class="grid">

      <div class="body-flex">
        <div class="information">
          <h1>Razón Social: </h1>
          <p>{{ cliente?.razonSocial }}</p>
        </div>
        <div class="information">
          <h1>Encargado General: </h1>
          <p>{{ cliente?.encargadoGeneral }}</p>
        </div>
      </div>

      <div class="body-flex">
        <div class="information">
          <h1>RUT Cliente: </h1>
          <p>{{ cliente?.rut }}</p>
        </div>
        <div class="information">
          <h1>Teléfono: </h1>
          <p>{{ cliente?.telefonoEncargado }}</p>
        </div>
      </div>

      <div class="body-flex">
        <div class="information">
          <h1>ID Cliente: </h1>
          <p>asdsadsad</p>
        </div>
        <div class="information">
          <h1>Correo: </h1>
          <p>{{ cliente?.correo }}</p>
        </div>
      </div>

    </div>
  </div>

</section>
